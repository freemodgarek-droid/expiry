<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; padding: 15px; margin: 0; }
        .header { text-align: center; color: #ff0000; padding: 10px; border-bottom: 2px solid #111; margin-bottom: 15px; }
        .counter { text-align: center; font-size: 0.9em; color: #888; margin-bottom: 15px; }
        #total { color: #ff0000; font-weight: bold; font-size: 1.2em; }
        .card { background: #111; border: 1px solid #222; border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .id-txt { color: #00ff00; font-family: monospace; font-size: 0.95em; word-break: break-all; margin-right: 5px; }
        .status { font-size: 0.7em; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; margin-top: 4px; display: inline-block; }
        .active { background: #1b5e20; color: #4caf50; }
        .banned { background: #b71c1c; color: #f44336; }
        .btn { background: #ff0000; color: white; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; font-size: 0.75em; min-width: 80px; }
        .btn-unban { background: #4caf50; }
</style>
  </head>
  <body>
    <div class="header">REZA MODS ADMIN</div>
    <div class="counter">ID TERHUBUNG: <span id="total">0</span></div>
    <div id="list"></div>

<script>
        const url = "https://tim-gemini-reza-default-rtdb.asia-southeast1.firebasedatabase.app/Users.json";

        async function load() {
            try {
                const res = await fetch(url);
                const data = await res.json();
                const container = document.getElementById('list');
                const total = document.getElementById('total');
                container.innerHTML = '';
                if(!data) { total.innerText = "0"; return; }

                const keys = Object.keys(data);
                total.innerText = keys.length;

                keys.forEach(id => {
                    const status = data[id].status ? data[id].status.access : "active";
                    const isBan = status === "banned";
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div>
                            <div class="id-txt">${id}</div>
                            <div class="status ${isBan?'banned':'active'}">${status}</div>
                        </div>
                        <button class="btn ${isBan?'btn-unban':''}" onclick="upd('${id}','${isBan?'active':'banned'}')">
                            ${isBan?'OPEN':'BAN'}
                        </button>
                    `;
                    container.appendChild(div);
                });
            } catch(e) {}
        }

        async function upd(id, s) {
            const upUrl = `https://tim-gemini-reza-default-rtdb.asia-southeast1.firebasedatabase.app/Users/${id}/status.json`;
            await fetch(upUrl, { method: 'PATCH', body: JSON.stringify({ access: s }) });
            load();
        }

        load();
        setInterval(load, 5000);
</script>
  </body>
</html>
